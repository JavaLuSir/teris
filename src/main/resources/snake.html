<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #1a1a2e; 
  min-height: 100vh; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  font-family: 'Segoe UI', sans-serif;
  color: #fff;
  padding: 20px;
}
.menu { margin-bottom: 20px; }
.menu a {
  color: #00d4ff;
  text-decoration: none;
  margin: 0 10px;
  font-size: 16px;
}
.menu a:hover { text-decoration: underline; }
h1 { margin-bottom: 20px; text-shadow: 0 0 10px #00ff88; }
.game-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
.canvas-wrap { position: relative; border: 3px solid #00ff88; border-radius: 8px; overflow: hidden; box-shadow: 0 0 30px rgba(0,255,136,0.3); }
canvas { display: block; background: #16213e; }
.info-panel { display: flex; flex-direction: column; gap: 15px; min-width: 150px; }
.info-box { 
  background: #16213e; 
  padding: 15px; 
  border-radius: 8px; 
  border: 2px solid #0f3460;
}
.info-box h3 { color: #00ff88; margin-bottom: 10px; font-size: 14px; }
.info-box .value { font-size: 24px; font-weight: bold; }
.controls { 
  margin-top: 20px; 
  text-align: center; 
  color: #888;
  font-size: 12px;
}
.controls span { margin: 0 10px; }
.game-over {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  display: none;
}
.game-over.show { display: flex; }
.game-over h2 { font-size: 36px; color: #e94560; margin-bottom: 20px; }
.btn {
  background: #00ff88;
  color: #1a1a2e;
  border: none;
  padding: 12px 30px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn:hover { background: #00cc6a; transform: scale(1.05); }
</style>
</head>
<body>
<div class="menu">
  <a href="teris.html">俄罗斯方块</a>
  <a href="breakout.html">打砖块</a>
  <a href="snake.html">贪吃蛇</a>
</div>
<h1>🐍 贪吃蛇</h1>
<div class="game-container">
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="game-over" id="gameOver">
      <h2>游戏结束</h2>
      <p>最终得分: <span id="finalScore">0</span></p>
      <br>
      <button class="btn" onclick="startGame()">再来一局</button>
    </div>
  </div>
  <div class="info-panel">
    <div class="info-box">
      <h3>得分</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="info-box">
      <h3>最高分</h3>
      <div class="value" id="highScore">0</div>
    </div>
    <div class="info-box">
      <h3>速度</h3>
      <div class="value" id="speed">1x</div>
    </div>
  </div>
</div>
<div class="controls">
  <span>↑ ↓ ← → 或 W A S D 控制方向</span>
  <span>空格键 暂停</span>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake = [];
let food = { x: 10, y: 10 };
let dx = 0;
let dy = 0;
let score = 0;
let highScore = localStorage.getItem('snakeHighScore') || 0;
let gameLoop = null;
let isPaused = false;
let isGameOver = false;
let speed = 150;

// 初始化
function init() {
  updateUI();
  draw();
}

function startGame() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dx = 1;
  dy = 0;
  score = 0;
  speed = 150;
  isPaused = false;
  isGameOver = false;
  placeFood();
  updateUI();
  document.getElementById('gameOver').classList.remove('show');
  
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(gameStep, speed);
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
  // 确保食物不在蛇身上
  for (let segment of snake) {
    if (segment.x === food.x && segment.y === food.y) {
      placeFood();
      break;
    }
  }
}

function gameStep() {
  if (isPaused || isGameOver) return;
  
  // 移动蛇
  const head = { x: snake[0].x + dx, y: snake[0].y + dy };
  
  // 撞墙检测
  if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
    endGame();
    return;
  }
  
  // 撞自己检测
  for (let segment of snake) {
    if (segment.x === head.x && segment.y === head.y) {
      endGame();
      return;
    }
  }
  
  snake.unshift(head);
  
  // 吃食物
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score % 50 === 0 && speed > 50) {
      speed -= 10;
      clearInterval(gameLoop);
      gameLoop = setInterval(gameStep, speed);
    }
    placeFood();
    updateUI();
  } else {
    snake.pop();
  }
  
  draw();
}

function endGame() {
  isGameOver = true;
  clearInterval(gameLoop);
  
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
  }
  
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOver').classList.add('show');
  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('highScore').textContent = highScore;
  document.getElementById('speed').textContent = (150 - speed) / 10 + 1 + 'x';
}

function draw() {
  // 清空画布
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // 绘制网格
  ctx.strokeStyle = '#1a2a4a';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= tileCount; i++) {
    ctx.beginPath();
    ctx.moveTo(i * gridSize, 0);
    ctx.lineTo(i * gridSize, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * gridSize);
    ctx.lineTo(canvas.width, i * gridSize);
    ctx.stroke();
  }
  
  // 绘制蛇
  snake.forEach((segment, index) => {
    const gradient = ctx.createRadialGradient(
      segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, 0,
      segment.x * gridSize + gridSize/2, segment.y * gridSize + gridSize/2, gridSize
    );
    gradient.addColorStop(0, index === 0 ? '#00ff88' : '#00cc6a');
    gradient.addColorStop(1, index === 0 ? '#00cc6a' : '#009950');
    
    ctx.fillStyle = gradient;
    ctx.shadowBlur = index === 0 ? 15 : 0;
    ctx.shadowColor = '#00ff88';
    ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
    ctx.shadowBlur = 0;
  });
  
  // 绘制食物
  const foodGradient = ctx.createRadialGradient(
    food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, 0,
    food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize
  );
  foodGradient.addColorStop(0, '#ff6b35');
  foodGradient.addColorStop(1, '#e94560');
  
  ctx.fillStyle = foodGradient;
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#ff6b35';
  ctx.beginPath();
  ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// 键盘控制
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!isGameOver) {
      isPaused = !isPaused;
    }
    return;
  }
  
  const key = e.code;
  
  // 防止反向移动
  if ((key === 'ArrowUp' || key === 'KeyW') && dy !== 1) {
    dx = 0; dy = -1;
  } else if ((key === 'ArrowDown' || key === 'KeyS') && dy !== -1) {
    dx = 0; dy = 1;
  } else if ((key === 'ArrowLeft' || key === 'KeyA') && dx !== 1) {
    dx = -1; dy = 0;
  } else if ((key === 'ArrowRight' || key === 'KeyD') && dx !== -1) {
    dx = 1; dy = 0;
  }
});

init();
startGame();
</script>
</body>
</html>
